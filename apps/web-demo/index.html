<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flyfish File Viewer Web Demo</title>
    <link rel="icon" href="/logo.png" />
  </head>
  <body>
    <main class="web-demo-shell">
      <header class="topbar">
        <div class="brand">
          <img src="/logo.png" alt="" />
          <div>
            <h1>Flyfish File Viewer</h1>
            <p id="subtitle">Pure Web package demo</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="locale-zh" type="button">中文</button>
          <button id="locale-en" type="button">EN</button>
          <button id="snippet-toggle" type="button">接入代码</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="control-panel" id="control-panel">
          <div class="mode-tabs" role="tablist" aria-label="source mode">
            <button id="mode-url" type="button" class="active">链接</button>
            <button id="mode-file" type="button">本地</button>
          </div>

          <form id="url-form" class="url-form">
            <label for="url-input">文件地址</label>
            <div class="field-row">
              <input id="url-input" type="url" autocomplete="off" spellcheck="false" />
              <button id="open-url" type="submit">预览</button>
            </div>
          </form>

          <label class="file-drop" id="file-drop">
            <input id="file-input" type="file" />
            <span id="file-drop-title">选择本地文件</span>
            <small id="file-drop-subtitle">支持拖拽或点击上传</small>
          </label>

          <section class="quick-section" aria-labelledby="quick-title">
            <div class="section-heading">
              <h2 id="quick-title">快速试用</h2>
              <span id="active-type">AUTO</span>
            </div>
            <div id="scenario-grid" class="scenario-grid"></div>
          </section>

          <section class="sample-section" aria-labelledby="sample-title">
            <div class="section-heading">
              <h2 id="sample-title">示例文件</h2>
              <button id="collapse-samples" type="button">收起</button>
            </div>
            <div id="sample-groups" class="sample-groups"></div>
          </section>

          <section class="snippet-panel" id="snippet-panel" hidden>
            <div class="section-heading">
              <h2 id="snippet-title">接入代码</h2>
              <button id="snippet-copy" type="button">复制</button>
            </div>
            <pre><code id="snippet-code"></code></pre>
          </section>
        </aside>

        <section class="viewer-column">
          <div class="viewer-toolbar">
            <div class="file-summary">
              <span id="file-badge" data-family="word">W</span>
              <div>
                <strong id="display-name">word.docx</strong>
                <small id="display-path">/example/word.docx</small>
              </div>
            </div>
            <div class="viewer-actions">
              <button id="zoom-out" type="button" title="缩小">-</button>
              <button id="zoom-label" type="button" title="还原">100%</button>
              <button id="zoom-in" type="button" title="放大">+</button>
              <button id="search-toggle" type="button">搜索</button>
              <button id="watermark-toggle" type="button">水印</button>
              <button id="download-action" type="button">下载</button>
              <button id="print-action" type="button">打印</button>
              <button id="html-action" type="button">HTML</button>
            </div>
          </div>

          <form id="search-popover" class="search-popover" hidden>
            <input id="search-input" type="search" autocomplete="off" />
            <button id="search-submit" type="submit">搜索</button>
            <button id="search-prev" type="button">&lt;</button>
            <button id="search-next" type="button">&gt;</button>
            <button id="search-clear" type="button">x</button>
            <span id="search-count">0/0</span>
          </form>

          <div id="viewer" class="viewer-host"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
